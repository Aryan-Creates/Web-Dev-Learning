<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: black;
        }
        .box1{
            color: yellow;
            padding: 20px;
            margin: 10px;
            border: 5px solid rgb(230, 25, 127);
            height: 20px;
            box-sizing: border-box;
        }
        .box2{
            color: red;
            padding: 20px;
            margin: 10px;
            border: 5px solid rgb(230, 25, 127);
            height: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box box1">It is a box</div>
    <div class="box box2">Ir is a box too</div>
</body>
</html>
