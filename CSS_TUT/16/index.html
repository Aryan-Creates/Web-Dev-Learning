<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS media query</title>
    <style>
        body{
            background-color: rgb(220, 40, 40);
        }
        @media screen and (orienation: portrait) {
            body{
                border: 8px solid pink;
            }
        }
        @media only screen and (max-width: 400px){
            body{
                background-color: blue;
            }
            .boxes{
                flex-direction: column;
            }
        }
        .box{
            width: 500px;
            height: 500px;
            background-color: aquamarine;
            padding: 4px;
            margin: 4px;
        }
    </style>
</head>
<body>
    <div>
        this is a test text.
    </div>
    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
