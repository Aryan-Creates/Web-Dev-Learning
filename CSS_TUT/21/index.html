<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS FlexBox</title>
    <style>
        .container{
            border: 6px solid green;
            display: flex;
            height: 80vh;
            /* justify-content: space-between; */
            align-items: center;
            /* flex-direction: column; */
            /* flex-wrap: wrap; */
            /* align-content: center; */
            /* flex-flow: row wrap; */
            /* gap: 40px; */
            /* row-gap: 50px; */
            /* column-gap: 60px; */
            gap: 40px 10px;
        }           
        body{
            background-color: black;
        }
        .item{
            /* flex-grow: 1; */
            height: 82px;
            width: 82px;
            border: 3px solid red;
            margin: 16px;
            background-color: aquamarine;
        }
        .order-1{
            order: 1;
        }
        .order-2{
            order: 2;
        }
        .order-3{
            order: 3;
        }
        .item2{
            /* flex-grow: 2; */
            flex-shrink: 2;
            align-self: flex-start;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item order-1">3</div>
            <div class="item order-2">4</div>
            <div class="item order-3">5</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
    </main>
</body>
</html>
