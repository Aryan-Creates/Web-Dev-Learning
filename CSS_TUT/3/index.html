<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selectors</title>
    <style>
        /* div{
            background-color: rebeccapurple;
        } */
        .red{
            background-color: rebeccapurple;
        }
        #green{
            background-color: green;
        }
        div > p{
            color: brown;
            background-color: black;
        }
        div p{
            color: brown;
            background-color: black;
        }
        * {
            margin: 0;
            padding: 0;
        }
        a:visited{
            color: aquamarine;
        }
        a:link{
            color: blue;
        }
        a:active{
            background-color: red;
        }
        a:hover{
            background-color: black;
        }
        p:first-child{
            background-color: chartreuse;
        }
    </style>
</head>
<body>
    <div class="one">
        <p>i am first</p>
        <p>i am second</p>
    </div>
    <div class="red">
        it is a div
        <article>
            <p>this is a para inside div</p>
        </article>
    </div>
    <div id="green">
        this is another div
    </div>
    <a href="https://www.google.com">google</a>
    <a href="https://www.instagram.com">insta</a>
</body>
</html>
