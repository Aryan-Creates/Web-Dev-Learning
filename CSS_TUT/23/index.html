<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS transform</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 90px;
            width: 90px;
            background-color: bisque;
            border: 4px solid black;
            /* transform: rotate(0.5turn); */
            /* transform: rotateZ(40deg); */
            /* transform: skewY(24deg); */
            /* transform: translateY(100%) skewX(40deg) translateX(24px); */
            transform: rotate(300deg);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: 100vw;
            height: 80vh;
            border: 8px dotted rgb(133, 4, 133);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>
</html>
