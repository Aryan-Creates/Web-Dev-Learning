<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 10px solid black;
            padding: 20px;
            box-shadow: 4px 8px 20px rgb(24, 73, 197);
        }
        .text-shadow{
            text-shadow: 2px 4px 5px rgb(168, 4, 187);
            outline: 4px solid red;
            border: 8px solid green;
            outline-offset: -2px;
            border-radius: 11px;
        }
    </style>
</head>
<body>
    <div class="box">
        this is a box
    </div>
    <p class="text-shadow">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Distinctio enim recusandae deserunt.
    </p>
</body>
</html>
