<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 100px;
            width: 40vw;
            padding: 4px;
            margin: 4px;
            border: 2px solid black;
        }
        .box1{
            position: relative;
            left: 40px;
            top: 70px;
            z-index: 1;
            background-color: aquamarine;
        }
        .box2{
            background-color: rgb(21, 219, 25);
        }
        .box3{
            position: relative;
            left: 100px;
            bottom: 70px;
            background-color: rgb(20, 137, 232);
        }
        .parent{
            padding: 44px;
            margin: 34px;
            border: 3px solid purple;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
</body>
</html>
