<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Forms</title>
</head>

<body>
    <h1>Forms to apply for hacker</h1>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter a username" />
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male" />
            <label for="male"> MALE</label>
            <input type="radio" id="female" name="gender" value="female" />
            <label for="female"> FEMALE</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes" />
            <label for="subscribe"> subscribe to the channel</label>
        </div>
        <div>
            <textarea name="comment" rows="3" cols="40">Enter something
            </textarea><br>
            <label for="comment"> Enter your comment</label><br>
            <textarea id="comment" name="comment" rows="3" cols="40">
            </textarea>
        </div>
        <div>
            <select name="fruit">
            <option value="apple">apple</option>
            <option value="mango">mango</option>
            <option value="banana">banana</option>
            </select>
        </div>
    </form>
</body>

</html>
